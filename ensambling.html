<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script><script>(()=>{setTimeout(()=>{const{markmap:S,mm:Q}=window,$=new S.Toolbar;$.attach(Q);const I=$.render();I.setAttribute("style","position:absolute;bottom:20px;right:20px"),document.body.append(I)})})()</script><script>((l,U,M,R)=>{const N=l();window.mm=N.Markmap.create("svg#mindmap",(U||N.deriveOptions)(R),M),window.matchMedia("(prefers-color-scheme: dark)").matches&&document.documentElement.classList.add("markmap-dark")})(()=>window.markmap,null,{"content":"M&#xe9;todos de ensambling","children":[{"content":"I. Fundamentos de Ensemble Learning","children":[{"content":"<strong>Definici&#xf3;n:</strong> Es una t&#xe9;cnica de aprendizaje autom&#xe1;tico que combina varios modelos individuales, denominados <strong>&quot;weak learners&quot;</strong> (aprendices d&#xe9;biles), para crear un modelo predictivo m&#xe1;s potente y preciso.","children":[],"payload":{"tag":"li","lines":"10,11"}},{"content":"<strong>Motivaci&#xf3;n:</strong> Se basa en la <strong>&quot;sabidur&#xed;a de las multitudes&quot;</strong>, donde el juicio colectivo de un grupo suele ser superior al de un solo experto.","children":[],"payload":{"tag":"li","lines":"11,12"}},{"content":"<strong>Objetivo principal:</strong> Mejorar la confiabilidad y estabilidad de las predicciones, permitiendo que los aciertos de unos modelos compensen los errores de otros, siempre que estos errores no est&#xe9;n correlacionados.","children":[],"payload":{"tag":"li","lines":"12,13"}},{"content":"<strong>Compromiso Sesgo-Varianza (Bias-Variance Tradeoff):</strong>","children":[{"content":"El error total de un modelo se compone de <strong>sesgo</strong> (error por suposiciones err&#xf3;neas), <strong>varianza</strong> (sensibilidad al ruido en los datos) y un error irreducible.","children":[],"payload":{"tag":"li","lines":"14,15"}},{"content":"Los ensembles buscan reducir el sesgo, la varianza o ambos para minimizar el error de prueba (test error).","children":[],"payload":{"tag":"li","lines":"15,17"}}],"payload":{"tag":"li","lines":"13,17"}}],"payload":{"tag":"h2","lines":"9,10"}},{"content":"II. Bagging (Bootstrap Aggregating)","children":[{"content":"<strong>Concepto:</strong> M&#xe9;todo que entrena modelos del mismo tipo (<strong>homog&#xe9;neos</strong>) de forma <strong>independiente y en paralelo</strong>.","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"<strong>Funcionamiento:</strong>","children":[{"content":"1. <strong>Bootstrapping:</strong> Se crean m&#xfa;ltiples subconjuntos de datos mediante muestreo aleatorio con reemplazo del conjunto de entrenamiento original.","children":[],"payload":{"tag":"li","lines":"22,23","listIndex":1}},{"content":"2. <strong>Entrenamiento:</strong> Se entrena un modelo base en cada muestra de bootstrap.","children":[],"payload":{"tag":"li","lines":"23,24","listIndex":2}},{"content":"3. <strong>Agregaci&#xf3;n:</strong> Se combinan las predicciones finales mediante el <strong>promedio</strong> (en regresi&#xf3;n) o la <strong>votaci&#xf3;n mayoritaria</strong> (en clasificaci&#xf3;n).","children":[],"payload":{"tag":"li","lines":"24,25","listIndex":3}}],"payload":{"tag":"li","lines":"21,25"}},{"content":"<strong>Ventajas:</strong> Es especialmente eficaz para <strong>reducir la varianza</strong> y evitar el sobreajuste (overfitting) en modelos inestables como los &#xe1;rboles de decisi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"<strong>Algoritmo Clave: Random Forest</strong>","children":[{"content":"Extensi&#xf3;n del bagging que a&#xf1;ade una capa extra de aleatoriedad: en cada divisi&#xf3;n de los nodos, solo se considera un <strong>subconjunto aleatorio de atributos</strong>.","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"Permite la validaci&#xf3;n <strong>Out-Of-Bag (OOB)</strong>, utilizando las instancias que no fueron incluidas en la muestra de bootstrap para estimar el error sin necesidad de validaci&#xf3;n cruzada externa.","children":[],"payload":{"tag":"li","lines":"28,30"}}],"payload":{"tag":"li","lines":"26,30"}}],"payload":{"tag":"h2","lines":"19,20"}},{"content":"III. Boosting","children":[{"content":"<strong>Concepto:</strong> T&#xe9;cnica <strong>secuencial e iterativa</strong> donde cada modelo nuevo se construye para corregir espec&#xed;ficamente los errores de los modelos anteriores.","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"<strong>Funcionamiento:</strong>","children":[{"content":"1. Entrenamiento paso a paso: los modelos no son independientes.","children":[],"payload":{"tag":"li","lines":"35,36","listIndex":1}},{"content":"2. <strong>Ajuste de pesos:</strong> Se asigna mayor peso o importancia a las instancias que fueron mal clasificadas o que resultaron dif&#xed;ciles de predecir en la etapa anterior.","children":[],"payload":{"tag":"li","lines":"36,37","listIndex":2}}],"payload":{"tag":"li","lines":"34,37"}},{"content":"<strong>Ventajas:</strong> Su objetivo principal es <strong>reducir el sesgo</strong>, logrando una alta precisi&#xf3;n en conjuntos de datos estructurados.","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"<strong>Algoritmos Principales:</strong>","children":[{"content":"1. <strong>AdaBoost (Adaptive Boosting):</strong> Utiliza un ratio de aprendizaje y actualiza los pesos de las observaciones de forma exponencial seg&#xfa;n su dificultad.","children":[],"payload":{"tag":"li","lines":"39,40","listIndex":1}},{"content":"2. <strong>Gradient Boosting:</strong> Generaliza el boosting minimizando una funci&#xf3;n de p&#xe9;rdida arbitraria (diferenciable) mediante el entrenamiento de modelos sobre los <strong>pseudo-residuales</strong> (la diferencia entre el valor real y la predicci&#xf3;n actual).","children":[],"payload":{"tag":"li","lines":"40,41","listIndex":2}},{"content":"3. <strong>Variantes Avanzadas:</strong>","children":[{"content":"<strong>XGBoost:</strong> Optimizado para grandes vol&#xfa;menes de datos y alta velocidad.","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"<strong>CatBoost:</strong> Especializado en el manejo nativo de <strong>variables categ&#xf3;ricas</strong> sin necesidad de codificaci&#xf3;n manual.","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>LightGBM:</strong> Enfocado en la rapidez y eficiencia en conjuntos de datos masivos.","children":[],"payload":{"tag":"li","lines":"44,46"}}],"payload":{"tag":"li","lines":"41,46","listIndex":3}}],"payload":{"tag":"li","lines":"38,46"}}],"payload":{"tag":"h2","lines":"32,33"}},{"content":"IV. Stacking (Stacked Generalization)","children":[{"content":"<strong>Concepto:</strong> M&#xe9;todo jer&#xe1;rquico que combina las predicciones de modelos <strong>heterog&#xe9;neos</strong> (de distintos tipos, como SVM, KNN y redes neuronales).","children":[],"payload":{"tag":"li","lines":"49,50"}},{"content":"<strong>Estructura:</strong>","children":[{"content":"<strong>Nivel 0 (Modelos base):</strong> Diferentes algoritmos que realizan las predicciones iniciales.","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"<strong>Nivel 1 (Meta-modelo):</strong> Un nuevo modelo que toma las predicciones del Nivel 0 como sus variables de entrada (<strong>meta-features</strong>) y aprende la regla &#xf3;ptima para combinarlas.","children":[],"payload":{"tag":"li","lines":"52,53"}}],"payload":{"tag":"li","lines":"50,53"}},{"content":"<strong>Diferencia clave:</strong> A diferencia de Bagging o Boosting, la regla de combinaci&#xf3;n no es fija (como un promedio), sino que es <strong>aprendida de los datos</strong> por el meta-modelo.","children":[],"payload":{"tag":"li","lines":"53,55"}}],"payload":{"tag":"h2","lines":"48,49"}},{"content":"V. Comparativa y Aplicaciones Reales","children":[{"content":"<strong>Cuadro Resumen de Diferencias:</strong>","children":[{"content":"<strong>Bagging:</strong> Entrenamiento paralelo, reduce varianza, riesgo de sesgo alto.","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"<strong>Boosting:</strong> Entrenamiento secuencial, reduce sesgo, sensible al ruido y sobreajuste.","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"<strong>Stacking:</strong> Entrenamiento jer&#xe1;rquico, explota la diversidad de modelos, complejidad computacional alta.","children":[],"payload":{"tag":"li","lines":"61,62"}}],"payload":{"tag":"li","lines":"58,62"}},{"content":"<strong>&#xc1;reas de Aplicaci&#xf3;n:</strong>","children":[{"content":"<strong>Sanidad:</strong> Selecci&#xf3;n de genes y predicci&#xf3;n de enfermedades como la diabetes.","children":[],"payload":{"tag":"li","lines":"63,64"}},{"content":"<strong>Finanzas:</strong> Detecci&#xf3;n de fraude bancario, evaluaci&#xf3;n de riesgo crediticio y valoraci&#xf3;n de activos.","children":[],"payload":{"tag":"li","lines":"64,65"}},{"content":"<strong>Tecnolog&#xed;a y Seguridad:</strong> Sistemas de detecci&#xf3;n de intrusiones en redes y mejora de la precisi&#xf3;n en motores de b&#xfa;squeda.","children":[],"payload":{"tag":"li","lines":"65,66"}}],"payload":{"tag":"li","lines":"62,66"}}],"payload":{"tag":"h2","lines":"57,58"}}],"payload":{"tag":"h1","lines":"8,9"}},{"maxWidth":600})</script>
