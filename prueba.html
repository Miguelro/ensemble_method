x1="-1" x2="618" y1="60.6875" y2="60.6875"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="60"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Definición:</strong> Es una técnica de aprendizaje automático que combina varios modelos individuales, denominados <strong>"weak learners"</strong> (aprendices débiles), para crear un modelo predictivo más potente y preciso.</div></div></foreignobject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(638, -677.4609375)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="618" y1="40.6875" y2="40.6875"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Motivación:</strong> Se basa en la <strong>"sabiduría de las multitudes"</strong>, donde el juicio colectivo de un grupo suele ser superior al de un solo experto.</div></div></foreignobject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(638, -631.0859375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="618" y1="60.6875" y2="60.6875"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="60"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Objetivo principal:</strong> Mejorar la confiabilidad y estabilidad de las predicciones, permitiendo que los aciertos de unos modelos compensen los errores de otros, siempre que estos errores no estén correlacionados.</div></div></foreignobject></g><g data-depth="4" data-path="1.2.6.7" class="markmap-node" transform="translate(1148, -559.7109375)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="618" y1="40.59375" y2="40.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml">El error total de un modelo se compone de <strong>sesgo</strong> (error por suposiciones erróneas), <strong>varianza</strong> (sensibilidad al ruido en los datos) y un error irreducible.</div></div></foreignobject></g><g data-depth="4" data-path="1.2.6.8" class="markmap-node" transform="translate(1148, -513.5234375)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="618" y1="40.59375" y2="40.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml">Los ensembles buscan reducir el sesgo, la varianza o ambos para minimizar el error de prueba (test error).</div></div></foreignobject></g><g data-depth="3" data-path="1.2.6" class="markmap-node" transform="translate(638, -526.6171875)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="432" y1="20.6875" y2="20.6875"></line><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="430" cy="20.6875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="414" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Compromiso Sesgo-Varianza (Bias-Variance Tradeoff):</strong></div></div></foreignobject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(266, -635.2265625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="294" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="292" cy="20.875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="276" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">I. Fundamentos de Ensemble Learning</div></div></foreignobject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(612, -462.3359375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="618" y1="40.6875" y2="40.6875"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Concepto:</strong> Método que entrena modelos del mismo tipo (<strong>homogéneos</strong>) de forma <strong>independiente y en paralelo</strong>.</div></div></foreignobject></g><g data-depth="4" data-path="1.9.11.12" class="markmap-node" transform="translate(837, -410.9609375)"><line stroke="#ff7f0e" stroke-width="1.1875" x1="-1" x2="618" y1="40.59375" y2="40.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml">1. <strong>Bootstrapping:</strong> Se crean múltiples subconjuntos de datos mediante muestreo aleatorio con reemplazo del conjunto de entrenamiento original.</div></div></foreignobject></g><g data-depth="4" data-path="1.9.11.13" class="markmap-node" transform="translate(837, -364.7734375)"><line stroke="#2ca02c" stroke-width="1.1875" x1="-1" x2="576" y1="20.59375" y2="20.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="558" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">2. <strong>Entrenamiento:</strong> Se entrena un modelo base en cada muestra de bootstrap.</div></div></foreignobject></g><g data-depth="4" data-path="1.9.11.14" class="markmap-node" transform="translate(837, -338.5859375)"><line stroke="#d62728" stroke-width="1.1875" x1="-1" x2="618" y1="40.59375" y2="40.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml">3. <strong>Agregación:</strong> Se combinan las predicciones finales mediante el <strong>promedio</strong> (en regresión) o la <strong>votación mayoritaria</strong> (en clasificación).</div></div></foreignobject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(612, -364.7734375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="147" y1="20.6875" y2="20.6875"></line><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="145" cy="20.6875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="129" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Funcionamiento:</strong></div></div></foreignobject></g><g data-depth="3" data-path="1.9.15" class="markmap-node" transform="translate(612, -287.3984375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="618" y1="40.6875" y2="40.6875"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Ventajas:</strong> Es especialmente eficaz para <strong>reducir la varianza</strong> y evitar el sobreajuste (overfitting) en modelos inestables como los árboles de decisión.</div></div></foreignobject></g><g data-depth="4" data-path="1.9.16.17" class="markmap-node" transform="translate(958, -236.0234375)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="618" y1="40.59375" y2="40.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml">Extensión del bagging que añade una capa extra de aleatoriedad: en cada división de los nodos, solo se considera un <strong>subconjunto aleatorio de atributos</strong>.</div></div></foreignobject></g><g data-depth="4" data-path="1.9.16.18" class="markmap-node" transform="translate(958, -189.8359375)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="618" y1="60.59375" y2="60.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="60"><div><div xmlns="http://www.w3.org/1999/xhtml">Permite la validación <strong>Out-Of-Bag (OOB)</strong>, utilizando las instancias que no fueron incluidas en la muestra de bootstrap para estimar el error sin necesidad de validación cruzada externa.</div></div></foreignobject></g><g data-depth="3" data-path="1.9.16" class="markmap-node" transform="translate(612, -192.9296875)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="268" y1="20.6875" y2="20.6875"></line><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="266" cy="20.6875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="250" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Algoritmo Clave: Random Forest</strong></div></div></foreignobject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(266, -327.6328125)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="268" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="266" cy="20.875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="250" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">II. Bagging (Bootstrap Aggregating)</div></div></foreignobject></g><g data-depth="3" data-path="1.19.20" class="markmap-node" transform="translate(447, -118.6484375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="618" y1="40.6875" y2="40.6875"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Concepto:</strong> Técnica <strong>secuencial e iterativa</strong> donde cada modelo nuevo se construye para corregir específicamente los errores de los modelos anteriores.</div></div></foreignobject></g><g data-depth="4" data-path="1.19.21.22" class="markmap-node" transform="translate(672, -67.2734375)"><line stroke="#ff7f0e" stroke-width="1.1875" x1="-1" x2="496" y1="20.59375" y2="20.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="478" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">1. Entrenamiento paso a paso: los modelos no son independientes.</div></div></foreignobject></g><g data-depth="4" data-path="1.19.21 " height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Concepto:</strong> Método jerárquico que combina las predicciones de modelos <strong>heterogéneos</strong> (de distintos tipos, como SVM, KNN y redes neuronales).</div></div></foreignobject></g><g data-depth="4" data-path="1.32.34.35" class="markmap-node" transform="translate(807, 333.5078125)"><line stroke="#9467bd" stroke-width="1.1875" x1="-1" x2="618" y1="40.59375" y2="40.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Nivel 0 (Modelos base):</strong> Diferentes algoritmos que realizan las predicciones iniciales.</div></div></foreignobject></g><g data-depth="4" data-path="1.32.34.36" class="markmap-node" transform="translate(807, 379.6953125)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="618" y1="60.59375" y2="60.59375"></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="60"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Nivel 1 (Meta-modelo):</strong> Un nuevo modelo que toma las predicciones del Nivel 0 como sus variables de entrada (<strong>meta-features</strong>) y aprende la regla óptima para combinarlas.</div></div></foreignobject></g><g data-depth="3" data-path="1.32.34" class="markmap-node" transform="translate(626, 376.6015625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="103" y1="20.6875" y2="20.6875"></line><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="101" cy="20.6875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="85" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Estructura:</strong></div></div></foreignobject></g><g data-depth="3" data-path="1.32.37" class="markmap-node" transform="translate(626, 450.8828125)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="618" y1="60.6875" y2= ></line><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="600" height="40"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Tecnología y Seguridad:</strong> Sistemas de detección de intrusiones en redes y mejora de la precisión en motores de búsqueda.</div></div></foreignobject></g><g data-depth="3" data-path="1.38.43" class="markmap-node" transform="translate(631, 672.0078125)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="176" y1="20.6875" y2="20.6875"></line><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="174" cy="20.6875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="158" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml"><strong>Áreas de Aplicación:</strong></div></div></foreignobject></g><g data-depth="2" data-path="1.38" class="markmap-node" transform="translate(266, 615.2265625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="287" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="285" cy="20.875"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="269" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">V. Comparativa y Aplicaciones Reales</div></div></foreignobject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="188" y1="21.25" y2="21.25"></line><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="186" cy="21.25"></circle><foreignobject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="170" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">Métodos de ensambling</div></div></foreignobject></g></g></svg>
<script src="./Ensembles_mindmap_files/d3.min.js.descargar"></script><script src="./Ensembles_mindmap_files/index.js.descargar"></script><script src="./Ensembles_mindmap_files/index(1).js.descargar"></script><script>(()=>{setTimeout(()=>{const{markmap:S,mm:Q}=window,$=new S.Toolbar;$.attach(Q);const I=$.render();I.setAttribute("style","position:absolute;bottom:20px;right:20px"),document.body.append(I)})})()</script><script>((l,U,M,R)=>{const N=l();window.mm=N.Markmap.create("svg#mindmap",(U||N.deriveOptions)(R),M),window.matchMedia("(prefers-color-scheme: dark)").matches&&document.documentElement.classList.add("markmap-dark")})(()=>window.markmap,null,{"content":"M&#xe9;todos de ensambling","children":[{"content":"I. Fundamentos de Ensemble Learning","children":[{"content":"<strong>Definici&#xf3;n:</strong> Es una t&#xe9;cnica de aprendizaje autom&#xe1;tico que combina varios modelos individuales, denominados <strong>&quot;weak learners&quot;</strong> (aprendices d&#xe9;biles), para crear un modelo predictivo m&#xe1;s potente y preciso.","children":[],"payload":{"tag":"li","lines":"10,11"}},{"content":"<strong>Motivaci&#xf3;n:</strong> Se basa en la <strong>&quot;sabidur&#xed;a de las multitudes&quot;</strong>, donde el juicio colectivo de un grupo suele ser superior al de un solo experto.","children":[],"payload":{"tag":"li","lines":"11,12"}},{"content":"<strong>Objetivo principal:</strong> Mejorar la confiabilidad y estabilidad de las predicciones, permitiendo que los aciertos de unos modelos compensen los errores de otros, siempre que estos errores no est&#xe9;n correlacionados.","children":[],"payload":{"tag":"li","lines":"12,13"}},{"content":"<strong>Compromiso Sesgo-Varianza (Bias-Variance Tradeoff):</strong>","children":[{"content":"El error total de un modelo se compone de <strong>sesgo</strong> (error por suposiciones err&#xf3;neas), <strong>varianza</strong> (sensibilidad al ruido en los datos) y un error irreducible.","children":[],"payload":{"tag":"li","lines":"14,15"}},{"content":"Los ensembles buscan reducir el sesgo, la varianza o ambos para minimizar el error de prueba (test error).","children":[],"payload":{"tag":"li","lines":"15,17"}}],"payload":{"tag":"li","lines":"13,17"}}],"payload":{"tag":"h2","lines":"9,10"}},{"content":"II. Bagging (Bootstrap Aggregating)","children":[{"content":"<strong>Concepto:</strong> M&#xe9;todo que entrena modelos del mismo tipo (<strong>homog&#xe9;neos</strong>) de forma <strong>independiente y en paralelo</strong>.","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"<strong>Funcionamiento:</strong>","children":[{"content":"1. <strong>Bootstrapping:</strong> Se crean m&#xfa;ltiples subconjuntos de datos mediante muestreo aleatorio con reemplazo del conjunto de entrenamiento original.","children":[],"payload":{"tag":"li","lines":"22,23","listIndex":1}},{"content":"2. <strong>Entrenamiento:</strong> Se entrena un modelo base en cada muestra de bootstrap.","children":[],"payload":{"tag":"li","lines":"23,24","listIndex":2}},{"content":"3. <strong>Agregaci&#xf3;n:</strong> Se combinan las predicciones finales mediante el <strong>promedio</strong> (en regresi&#xf3;n) o la <strong>votaci&#xf3;n mayoritaria</strong> (en clasificaci&#xf3;n).","children":[],"payload":{"tag":"li","lines":"24,25","listIndex":3}}],"payload":{"tag":"li","lines":"21,25"}},{"content":"<strong>Ventajas:</strong> Es especialmente eficaz para <strong>reducir la varianza</strong> y evitar el sobreajuste (overfitting) en modelos inestables como los &#xe1;rboles de decisi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"<strong>Algoritmo Clave: Random Forest</strong>","children":[{"content":"Extensi&#xf3;n del bagging que a&#xf1;ade una capa extra de aleatoriedad: en cada divisi&#xf3;n de los nodos, solo se considera un <strong>subconjunto aleatorio de atributos</strong>.","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"Permite la validaci&#xf3;n <strong>Out-Of-Bag (OOB)</strong>, utilizando las instancias que no fueron incluidas en la muestra de bootstrap para estimar el error sin necesidad de validaci&#xf3;n cruzada externa.","children":[],"payload":{"tag":"li","lines":"28,30"}}],"payload":{"tag":"li","lines":"26,30"}}],"payload":{"tag":"h2","lines":"19,20"}},{"content":"III. Boosting","children":[{"content":"<strong>Concepto:</strong> T&#xe9;cnica <strong>secuencial e iterativa</strong> donde cada modelo nuevo se construye para corregir espec&#xed;ficamente los errores de los modelos anteriores.","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"<strong>Funcionamiento:</strong>","children":[{"content":"1. Entrenamiento paso a paso: los modelos no son independientes.","children":[],"payload":{"tag":"li","lines":"35,36","listIndex":1}},{"content":"2. <strong>Ajuste de pesos:</strong> Se asigna mayor peso o importancia a las instancias que fueron mal clasificadas o que resultaron dif&#xed;ciles de predecir en la etapa anterior.","children":[],"payload":{"tag":"li","lines":"36,37","listIndex":2}}],"payload":{"tag":"li","lines":"34,37"}},{"content":"<strong>Ventajas:</strong> Su objetivo principal es <strong>reducir el sesgo</strong>, logrando una alta precisi&#xf3;n en conjuntos de datos estructurados.","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"<strong>Algoritmos Principales:</strong>","children":[{"content":"1. <strong>AdaBoost (Adaptive Boosting):</strong> Utiliza un ratio de aprendizaje y actualiza los pesos de las observaciones de forma exponencial seg&#xfa;n su dificultad.","children":[],"payload":{"tag":"li","lines":"39,40","listIndex":1}},{"content":"2. <strong>Gradient Boosting:</strong> Generaliza el boosting minimizando una funci&#xf3;n de p&#xe9;rdida arbitraria (diferenciable) mediante el entrenamiento de modelos sobre los <strong>pseudo-residuales</strong> (la diferencia entre el valor real y la predicci&#xf3;n actual).","children":[],"payload":{"tag":"li","lines":"40,41","listIndex":2}},{"content":"3. <strong>Variantes Avanzadas:</strong>","children":[{"content":"<strong>XGBoost:</strong> Optimizado para grandes vol&#xfa;menes de datos y alta velocidad.","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"<strong>CatBoost:</strong> Especializado en el manejo nativo de <strong>variables categ&#xf3;ricas</strong> sin necesidad de codificaci&#xf3;n manual.","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>LightGBM:</strong> Enfocado en la rapidez y eficiencia en conjuntos de datos masivos.","children":[],"payload":{"tag":"li","lines":"44,46"}}],"payload":{"tag":"li","lines":"41,46","listIndex":3}}],"payload":{"tag":"li","lines":"38,46"}}],"payload":{"tag":"h2","lines":"32,33"}},{"content":"IV. Stacking (Stacked Generalization)","children":[{"content":"<strong>Concepto:</strong> M&#xe9;todo jer&#xe1;rquico que combina las predicciones de modelos <strong>heterog&#xe9;neos</strong> (de distintos tipos, como SVM, KNN y redes neuronales).","children":[],"payload":{"tag":"li","lines":"49,50"}},{"content":"<strong>Estructura:</strong>","children":[{"content":"<strong>Nivel 0 (Modelos base):</strong> Diferentes algoritmos que realizan las predicciones iniciales.","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"<strong>Nivel 1 (Meta-modelo):</strong> Un nuevo modelo que toma las predicciones del Nivel 0 como sus variables de entrada (<strong>meta-features</strong>) y aprende la regla &#xf3;ptima para combinarlas.","children":[],"payload":{"tag":"li","lines":"52,53"}}],"payload":{"tag":"li","lines":"50,53"}},{"content":"<strong>Diferencia clave:</strong> A diferencia de Bagging o Boosting, la regla de combinaci&#xf3;n no es fija (como un promedio), sino que es <strong>aprendida de los datos</strong> por el meta-modelo.","children":[],"payload":{"tag":"li","lines":"53,55"}}],"payload":{"tag":"h2","lines":"48,49"}},{"content":"V. Comparativa y Aplicaciones Reales","children":[{"content":"<strong>Cuadro Resumen de Diferencias:</strong>","children":[{"content":"<strong>Bagging:</strong> Entrenamiento paralelo, reduce varianza, riesgo de sesgo alto.","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"<strong>Boosting:</strong> Entrenamiento secuencial, reduce sesgo, sensible al ruido y sobreajuste.","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"<strong>Stacking:</strong> Entrenamiento jer&#xe1;rquico, explota la diversidad de modelos, complejidad computacional alta.","children":[],"payload":{"tag":"li","lines":"61,62"}}],"payload":{"tag":"li","lines":"58,62"}},{"content":"<strong>&#xc1;reas de Aplicaci&#xf3;n:</strong>","children":[{"content":"<strong>Sanidad:</strong> Selecci&#xf3;n de genes y predicci&#xf3;n de enfermedades como la diabetes.","children":[],"payload":{"tag":"li","lines":"63,64"}},{"content":"<strong>Finanzas:</strong> Detecci&#xf3;n de fraude bancario, evaluaci&#xf3;n de riesgo crediticio y valoraci&#xf3;n de activos.","children":[],"payload":{"tag":"li","lines":"64,65"}},{"content":"<strong>Tecnolog&#xed;a y Seguridad:</strong> Sistemas de detecci&#xf3;n de intrusiones en redes y mejora de la precisi&#xf3;n en motores de b&#xfa;squeda.","children":[],"payload":{"tag":"li","lines":"65,66"}}],"payload":{"tag":"li","lines":"62,66"}}],"payload":{"tag":"h2","lines":"57,58"}}],"payload":{"tag":"h1","lines":"8,9"}},{"maxWidth":600})</script>
